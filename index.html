<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>حاسبة المعدل الجامعي</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #eff6ff;
            --secondary: #6366f1;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            --radius-lg: 16px;
            --radius-md: 12px;
        }

        body.master-mode {
            --primary: #7c3aed;
            --primary-light: #f5f3ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            padding-bottom: 40px;
            transition: all 0.3s ease;
        }

        header {
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-icon { background: var(--primary); color: white; width: 40px; height: 40px; border-radius: var(--radius-md); display: grid; place-items: center; }
        .logo-text h1 { font-size: 1.1rem; font-weight: 800; }
        
        .mode-switcher {
            background: var(--bg-main);
            padding: 4px;
            border-radius: 100px;
            display: flex;
            gap: 4px;
            border: 1px solid var(--border);
        }

        .mode-btn {
            border: none; background: none; padding: 6px 16px; border-radius: 100px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: 0.3s; color: var(--text-muted);
        }

        .mode-btn.active { background: var(--card-bg); color: var(--primary); box-shadow: var(--shadow-sm); }

        .container {
            max-width: 1100px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        .stats-dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .stat-label { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }
        .stat-value { font-size: 1.8rem; font-weight: 800; color: var(--primary); font-variant-numeric: tabular-nums; }

        .stat-card.featured { background: var(--primary); color: white; border: none; }
        .stat-card.featured .stat-label { color: rgba(255,255,255,0.8); }
        .stat-card.featured .stat-value { color: white; font-size: 2.2rem; }

        .cum-inline-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 2rem;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }

        .cum-section-title { display: flex; align-items: center; gap: 10px; min-width: 160px; }
        .cum-section-title h3 { font-size: 0.95rem; font-weight: 700; color: var(--text-main); }

        .cum-inputs { display: flex; align-items: center; gap: 1.5rem; flex-grow: 1; }
        .input-group-inline { display: flex; align-items: center; gap: 10px; }
        .input-group-inline label { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; }
        .input-group-inline .input-minimal { width: 100px; }

        .cum-result-badge {
            background: var(--primary-light);
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid var(--primary);
            opacity: 0;
            transform: translateY(10px);
            transition: 0.3s;
            pointer-events: none;
        }

        .cum-result-badge.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .cum-result-badge span { font-size: 0.75rem; color: var(--primary); font-weight: 700; }
        .cum-result-badge strong { font-size: 1.4rem; color: var(--primary); font-variant-numeric: tabular-nums; }

        @media (max-width: 768px) {
            .cum-inline-card { flex-direction: column; align-items: stretch; gap: 1rem; }
            .cum-inputs { flex-direction: column; align-items: stretch; gap: 1rem; }
            .input-group-inline { justify-content: space-between; }
            .input-group-inline .input-minimal { width: 120px; }
        }

        .main-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background: var(--bg-main); padding: 12px 16px; font-size: 0.75rem; color: var(--text-muted); text-align: center; }
        td { padding: 12px 16px; border-bottom: 1px solid var(--border); text-align: center; font-variant-numeric: tabular-nums; }

        .input-minimal {
            border: 1px solid transparent; background: var(--bg-main);
            padding: 8px 12px; border-radius: var(--radius-md); font-size: 0.9rem; text-align: center;
        }

        .input-minimal:focus { outline: none; background: white; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }
        .input-minimal.name { text-align: right; width: 100%; }

        .grade-chip { padding: 4px 12px; border-radius: 100px; font-size: 0.8rem; font-weight: 700; display: inline-block; min-width: 45px; transition: 0.3s; }

        .btn-add {
            width: 100%; padding: 1.25rem; background: none; border: 2px dashed var(--border);
            color: var(--primary); font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        .btn-delete { color: var(--text-muted); background: none; border: none; cursor: pointer; padding: 5px; }
        .btn-delete:hover { color: var(--danger); background: #fee2e2; border-radius: 50%; }

        footer { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 0.85rem; }
        .animate-row { animation: fadeIn 0.2s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <div class="logo-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 10v6M2 10l10-5 10 5-10 5z"/><path d="M6 12v5c3.33 2 8.67 2 12 0v-5"/></svg></div>
        <div class="logo-text"><h1>حاسبة المعدل</h1></div>
    </div>
    <div class="mode-switcher">
        <button id="btn-b" class="mode-btn active" onclick="switchMode('B')">بكالوريوس</button>
        <button id="btn-m" class="mode-btn" onclick="switchMode('M')">ماجستير</button>
    </div>
    <button onclick="window.print()" class="mode-btn" style="background: var(--bg-main)">🖨️ طباعة التقرير</button>
</header>

<div class="container">
    <div class="stats-dashboard">
        <div class="stat-card featured">
            <span class="stat-label">المعدل الفصلي</span>
            <span class="stat-value" id="current-gpa">0.00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">إجمالي الساعات</span>
            <span class="stat-value" id="total-hours">0</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">إجمالي النقاط</span>
            <span class="stat-value" id="total-points">0.00</span>
        </div>
        <div class="stat-card">
            <span class="stat-label">التقدير العام</span>
            <span class="stat-value" id="current-grade" style="font-size: 1.1rem;">—</span>
        </div>
    </div>

    <div class="cum-inline-card">
        <div class="cum-section-title">
            <span>📈</span>
            <h3>المعدل التراكمي</h3>
        </div>
        <div class="cum-inputs">
            <div class="input-group-inline">
                <label>المعدل السابق</label>
                <input type="number" id="prev-gpa" class="input-minimal" placeholder="0.00" step="0.01" oninput="updateCurrentState(); calculateAll()">
            </div>
            <div class="input-group-inline">
                <label>الساعات السابقة</label>
                <input type="number" id="prev-hours" class="input-minimal" placeholder="0" oninput="updateCurrentState(); calculateAll()">
            </div>
        </div>
        <div id="cum-result-box" class="cum-result-badge">
            <span>التراكمي المتوقع</span>
            <strong id="final-cum-gpa">0.00</strong>
        </div>
    </div>

    <div class="main-card">
        <div class="card-header">
            <h2 id="table-title">المواد الدراسية (بكالوريوس)</h2>
            <span id="course-count" style="font-size: 0.8rem; color: var(--text-muted);">0 مواد</span>
        </div>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th width="60">#</th>
                        <th style="text-align: right;">المادة</th>
                        <th width="120">الدرجة</th>
                        <th width="120">الساعات</th>
                        <th width="120">التقدير</th>
                        <th width="120">النقاط</th>
                        <th width="60"></th>
                    </tr>
                </thead>
                <tbody id="course-body"></tbody>
            </table>
        </div>
        <button class="btn-add" onclick="addNewRow()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            إضافة مادة جديدة في هذا الفصل
        </button>
    </div>
</div>

<footer>
    <p>تطوير: <strong>د. سالم بن سعيد الحارثي</strong></p>
</footer>

<script>
    const GRADE_SYSTEM = {
        B: [
            { min: 95, label: 'أ', points: 4.0, color: '#10b981' },
            { min: 90, label: 'أ-', points: 3.7, color: '#10b981' },
            { min: 87, label: 'ب+', points: 3.3, color: '#3b82f6' },
            { min: 83, label: 'ب', points: 3.0, color: '#3b82f6' },
            { min: 80, label: 'ب-', points: 2.7, color: '#3b82f6' },
            { min: 77, label: 'ج+', points: 2.3, color: '#f59e0b' },
            { min: 73, label: 'ج', points: 2.0, color: '#f59e0b' },
            { min: 70, label: 'ج-', points: 1.7, color: '#f59e0b' },
            { min: 65, label: 'د+', points: 1.3, color: '#ef4444' },
            { min: 60, label: 'د', points: 1.0, color: '#ef4444' },
            { min: 0, label: 'هـ', points: 0.0, color: '#ef4444' }
        ],
        M: [
            { min: 95, label: 'أ', points: 4.0, color: '#10b981' },
            { min: 90, label: 'أ-', points: 3.7, color: '#10b981' },
            { min: 87, label: 'ب+', points: 3.3, color: '#3b82f6' },
            { min: 83, label: 'ب', points: 3.0, color: '#3b82f6' },
            { min: 80, label: 'ب-', points: 2.7, color: '#3b82f6' },
            { min: 75, label: 'ج+', points: 2.3, color: '#f59e0b' },
            { min: 70, label: 'ج', points: 2.0, color: '#f59e0b' },
            { min: 0, label: 'هـ', points: 0.0, color: '#ef4444' }
        ]
    };

    let appState = {
        currentMode: 'B',
        B: { courses: [{id:1, name:'', grade:'', hours:3}, {id:2, name:'', grade:'', hours:3}], prevGpa:'', prevHours:'' },
        M: { courses: [{id:101, name:'', grade:'', hours:3}, {id:102, name:'', grade:'', hours:3}], prevGpa:'', prevHours:'' }
    };

    function switchMode(m) {
        if (appState.currentMode === m) return;
        updateCurrentState();
        appState.currentMode = m;
        document.body.className = m === 'M' ? 'master-mode' : '';
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(m === 'B' ? 'btn-b' : 'btn-m').classList.add('active');
        document.getElementById('table-title').innerText = `المواد الدراسية (${m === 'B' ? 'بكالوريوس' : 'ماجستير'})`;
        renderTable();
        loadInputs();
        calculateAll();
    }

    function updateCurrentState() {
        const mode = appState.currentMode;
        appState[mode].prevGpa = document.getElementById('prev-gpa').value;
        appState[mode].prevHours = document.getElementById('prev-hours').value;
        const rows = document.querySelectorAll('#course-body tr');
        appState[mode].courses = Array.from(rows).map(row => ({
            id: row.id.split('-')[1],
            name: row.querySelector('.name').value,
            grade: row.querySelector('.grade-input').value,
            hours: row.querySelector('.hour-input').value
        }));
    }

    function renderTable() {
        const tbody = document.getElementById('course-body');
        tbody.innerHTML = '';
        appState[appState.currentMode].courses.forEach(c => injectRowToUI(c.id, c.name, c.grade, c.hours));
        updateIndices();
    }

    function loadInputs() {
        const data = appState[appState.currentMode];
        document.getElementById('prev-gpa').value = data.prevGpa;
        document.getElementById('prev-hours').value = data.prevHours;
    }

    function addNewRow() {
        const id = Date.now();
        injectRowToUI(id, '', '', 3);
        updateIndices();
        updateCurrentState();
    }

    function injectRowToUI(id, name, grade, hours) {
        const tbody = document.getElementById('course-body');
        const tr = document.createElement('tr');
        tr.id = `row-${id}`;
        tr.className = 'animate-row';
        tr.innerHTML = `
            <td class="row-index"></td>
            <td><input type="text" class="input-minimal name" placeholder="اسم المادة" value="${name}" oninput="updateCurrentState()"></td>
            <td><input type="number" class="input-minimal grade-input" placeholder="0" min="0" max="100" value="${grade}" oninput="updateCurrentState(); calculateAll()"></td>
            <td><input type="number" class="input-minimal hour-input" min="1" value="${hours}" oninput="updateCurrentState(); calculateAll()"></td>
            <td><span class="grade-chip">—</span></td>
            <td><span class="points-val">0.00</span></td>
            <td><button class="btn-delete" onclick="removeRow(${id})">✕</button></td>
        `;
        tbody.appendChild(tr);
        if(grade !== "") calculateAll();
    }

    function removeRow(id) {
        document.getElementById(`row-${id}`).remove();
        updateIndices();
        updateCurrentState();
        calculateAll();
    }

    function updateIndices() {
        const rows = document.querySelectorAll('.row-index');
        rows.forEach((td, i) => td.innerText = (i + 1));
        document.getElementById('course-count').innerText = `${rows.length} مواد`;
    }

    function calculateAll() {
        let tH = 0, tP = 0;
        document.querySelectorAll('#course-body tr').forEach(row => {
            const gradeInput = row.querySelector('.grade-input').value;
            const hr = parseFloat(row.querySelector('.hour-input').value) || 0;
            const chip = row.querySelector('.grade-chip');
            const pt = row.querySelector('.points-val');

            if (gradeInput.trim() === "") {
                chip.innerText = '—'; chip.style.backgroundColor = '#f1f5f9'; chip.style.color = '#64748b'; pt.innerText = '0.00'; return;
            }

            const sc = parseFloat(gradeInput);
            const system = GRADE_SYSTEM[appState.currentMode];
            const g = system.find(x => sc >= x.min) || system[system.length - 1];

            if (g && hr > 0) {
                chip.innerText = g.label;
                chip.style.backgroundColor = g.color + '20';
                chip.style.color = g.color;
                const p = g.points * hr;
                pt.innerText = p.toFixed(2);
                tH += hr; tP += p;
            }
        });

        document.getElementById('current-gpa').innerText = (tH > 0 ? (tP / tH) : 0).toFixed(2);
        document.getElementById('total-hours').innerText = tH;
        document.getElementById('total-points').innerText = tP.toFixed(2);

        let gpa = tH > 0 ? (tP / tH) : 0;
        let txt = '—';
        if (tH > 0) {
            if (appState.currentMode === 'M') {
                if (gpa >= 3.75) txt = 'امتياز';
                else if (gpa >= 3.00) txt = 'جيد جداً';
                else if (gpa >= 2.50) txt = 'جيد (مرضي)';
                else txt = 'ضعيف (تحت الملاحظة)';
            } else {
                if (gpa >= 3.50) txt = 'امتياز';
                else if (gpa >= 3.00) txt = 'جيد جداً';
                else if (gpa >= 2.50) txt = 'جيد';
                else if (gpa >= 2.00) txt = 'مقبول';
                else txt = 'ضعيف (رسوب)';
            }
        }
        document.getElementById('current-grade').innerText = txt;

        const pg = parseFloat(document.getElementById('prev-gpa').value);
        const ph = parseFloat(document.getElementById('prev-hours').value) || 0;
        const resultBadge = document.getElementById('cum-result-box');
        
        if (!isNaN(pg) && (tH + ph) > 0) {
            document.getElementById('final-cum-gpa').innerText = (((pg * ph) + tP) / (tH + ph)).toFixed(2);
            resultBadge.classList.add('show');
        } else {
            resultBadge.classList.remove('show');
        }
    }

    window.onload = () => { renderTable(); calculateAll(); };
</script>
</body>
</html>
